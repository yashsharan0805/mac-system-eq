name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.2.0)"
        required: true
        type: string
      create_release:
        description: "Create/update GitHub release and upload assets"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version and tag
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag="v${version#v}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi

          if [[ -z "$version" ]]; then
            echo "Unable to resolve release version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Configure signing inputs
        id: signing
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          if [[ -n "$CERT_P12_BASE64" && -n "$CERT_PASSWORD" && -n "$SIGN_IDENTITY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "identity=$SIGN_IDENTITY" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "identity=-" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"

          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build DMG
        id: build
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/dist"
          ./scripts/build-release-dmg.sh \
            --version "${{ steps.meta.outputs.version }}" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --output-dir "$OUTPUT_DIR" \
            --sign-identity "${{ steps.signing.outputs.identity }}"

          DMG_PATH="$OUTPUT_DIR/MacSystemEQ-${{ steps.meta.outputs.version }}.dmg"
          SHA_PATH="${DMG_PATH}.sha256"

          if [[ ! -f "$DMG_PATH" || ! -f "$SHA_PATH" ]]; then
            echo "Expected artifacts were not created"
            exit 1
          fi

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "sha_path=$SHA_PATH" >> "$GITHUB_OUTPUT"

      - name: Configure notarization inputs
        id: notary
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          if [[ "${{ steps.signing.outputs.enabled }}" == "true" && -n "$NOTARY_APPLE_ID" && -n "$NOTARY_TEAM_ID" && -n "$NOTARY_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notarize and staple DMG
        if: steps.notary.outputs.enabled == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "macsystemeq-notary" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

          xcrun notarytool submit "${{ steps.build.outputs.dmg_path }}" \
            --keychain-profile "macsystemeq-notary" \
            --wait

          xcrun stapler staple "${{ steps.build.outputs.dmg_path }}"
          spctl --assess --type open --verbose=4 "${{ steps.build.outputs.dmg_path }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macsystemeq-dmg-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.build.outputs.dmg_path }}
            ${{ steps.build.outputs.sha_path }}

      - name: Create or update GitHub Release
        if: github.event_name == 'push' || inputs.create_release == true
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: MacSystemEQ v${{ steps.meta.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ${{ steps.build.outputs.dmg_path }}
            ${{ steps.build.outputs.sha_path }}

      - name: Job summary
        run: |
          {
            echo "## Release DMG"
            echo "- Version: \`${{ steps.meta.outputs.version }}\`"
            echo "- Tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- DMG: \`${{ steps.build.outputs.dmg_path }}\`"
            echo "- Checksum: \`${{ steps.build.outputs.sha_path }}\`"
            echo "- Signing: \`${{ steps.signing.outputs.enabled == 'true' && 'enabled' || 'ad-hoc' }}\`"
            echo "- Notarization: \`${{ steps.notary.outputs.enabled == 'true' && 'enabled' || 'skipped' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
